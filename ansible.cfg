[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
# callback "default" (embutido): o "yaml" da community.general está
# DEPRECADO e quebra ao serializar saidas com caracteres de controle
# (codigos de cor ANSI → "unacceptable character #x001b"). O default
# nunca engasga e o --diff continua funcionando.
stdout_callback    = default
callbacks_enabled  = profile_tasks
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
