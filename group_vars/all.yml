# =============================================================================
# CDPNI — Variáveis padrão
# Este arquivo é SOBRESCRITO pelo bootstrap.sh com os valores interativos.
# Edite manualmente apenas se não usar o bootstrap.
# Nunca use este arquivo em produção sem alterar as senhas.
# =============================================================================

# Identidade da unidade — exibida no portal web e no certificado SSL.
# Para instalar em outra unidade (ex.: PLAVII), o bootstrap pergunta
# estes valores; nomes técnicos internos (serviço cdpni-portal, paths)
# não mudam e não precisam mudar.
org:
  name:     "CDPNI"
  fullname: "Centro de Detenção Provisória de Nova Independência"

server:
  ip:         "10.14.29.11"
  mask:       "24"
  gateway:    "10.14.29.1"
  dns:        "10.14.29.1"
  hostname:   "cdpni"
  domain:     "cdpni.local"
  admin_user: "sambadmin"
  iface:      "eth0"

# Redes com acesso permitido aos serviços (SSH, SMB, portal, painel).
# Além das faixas privadas RFC 1918, inclui as faixas legadas do CDPNI
# que ficam FORA do espaço privado: 172.14.29.0/24 e 192.14.29.0/24 são
# endereços PÚBLICOS reutilizados internamente — funciona atrás do
# gateway, mas sites reais da internet nessas faixas ficam inacessíveis.
# Sobreposições entre faixas são permitidas (o nftables usa auto-merge).
network_ranges:
  - "10.0.0.0/8"        # RFC 1918 — cobre a rede padrão 10.14.29.0/24
  - "172.16.0.0/12"     # RFC 1918
  - "192.168.0.0/16"    # RFC 1918
  - "172.14.29.0/24"    # faixa CDPNI legada (fora do RFC 1918)
  - "192.14.29.0/24"    # faixa CDPNI legada (fora do RFC 1918)

raid:
  level:   5
  mount:   /mnt/raid
  device:  /dev/md0
  devices:
    - /dev/sdb
    - /dev/sdc
    - /dev/sdd
    - /dev/sde
    - /dev/sdf

samba:
  workgroup:    "WORKGROUP"
  default_pass: "ALTERAR_NO_BOOTSTRAP"
  log_dir:      /var/log/samba
  # Usuários com bypass de permissão no Samba (admin users)
  # Populado dinamicamente pelo bootstrap — não editar manualmente
  extra_admins: []

portal:
  dir:  /opt/cdpni-portal
  user: cdpni
  port: 5000

ssl:
  dir:      /etc/nginx/ssl
  cert:     /etc/nginx/ssl/cdpni.crt
  key:      /etc/nginx/ssl/cdpni.key
  days:     3650
  country:  BR
  state:    SP
  org:      CDPNI

panel:
  dir:  /var/www/samba-panel
  user: admin
  pass: "ALTERAR_NO_BOOTSTRAP"
