---
# ── nftables ──────────────────────────────────────────────────────────────────
- name: Instalar nftables e Fail2ban
  ansible.builtin.apt:
    name: [nftables, fail2ban, smartmontools]
    state: present

- name: Desabilitar UFW se instalado (evitar conflito)
  ansible.builtin.command: systemctl disable --now ufw
  when: ansible_facts.services is defined and 'ufw' in ansible_facts.services
  ignore_errors: true
  changed_when: false


- name: Implantar ruleset nftables (validado com nft -c antes de instalar)
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0640"
    validate: /usr/sbin/nft -c -f %s
  notify: reload nftables

- name: Habilitar e iniciar nftables
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

# ── Fail2ban ──────────────────────────────────────────────────────────────────
- name: Configurar Fail2ban para usar nftables como banaction
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/defaults-nftables.conf
    content: |
      [DEFAULT]
      banaction     = nftables-multiport
      banaction_allports = nftables-allports
    mode: "0644"
  notify: restart fail2ban

- name: Configurar Fail2ban — jail Samba
  ansible.builtin.template:
    src: samba-jail.conf.j2
    dest: /etc/fail2ban/jail.d/samba.conf
    mode: "0644"
  notify: restart fail2ban

# A jail do portal precisa que o logpath exista, senão o fail2ban falha
# ao iniciar ("Have not found any log file"). O dono correto (usuário do
# portal) é ajustado depois pelo role flask_portal.
- name: Garantir logfile do portal para a jail do Fail2ban
  ansible.builtin.file:
    path: /var/log/cdpni_portal_access.log
    state: touch
    mode: "0664"
    access_time: preserve
    modification_time: preserve

- name: Configurar Fail2ban — jail Portal Flask
  ansible.builtin.template:
    src: portal-jail.conf.j2
    dest: /etc/fail2ban/jail.d/cdpni-portal.conf
    mode: "0644"
  notify: restart fail2ban

- name: Filtro Fail2ban para o portal Flask
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/cdpni-portal.conf
    content: |
      [Definition]
      # Detecta POST /login com resposta 200 contendo "inválidos" (login falhou mas retornou 200)
      # ou respostas 4xx diretas de autenticação
      failregex = ^<HOST> .* "POST /login HTTP/.*" 200 .*$
      ignoreregex = ^<HOST> .* "POST /login HTTP/.*" 30[12] .*$
    mode: "0644"
  notify: restart fail2ban

- name: Habilitar e iniciar Fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# ── S.M.A.R.T. ────────────────────────────────────────────────────────────────
- name: Configurar smartd
  ansible.builtin.copy:
    dest: /etc/smartd.conf
    content: |
      DEVICESCAN -a -o on -S on -n standby,q \
        -s (S/../.././02|L/../../6/03) \
        -m root -M exec /usr/share/smartmontools/smartd-runner
    mode: "0644"
  notify: restart smartd

- name: Habilitar smartd
  ansible.builtin.service:
    name: smartd
    state: started
    enabled: true
  ignore_errors: true

# ── SSL ───────────────────────────────────────────────────────────────────────
- name: Criar diretório SSL
  ansible.builtin.file:
    path: "{{ ssl.dir }}"
    state: directory
    mode: "0750"

- name: Gerar certificado SSL autoassinado
  ansible.builtin.command: >
    openssl req -x509 -nodes -days {{ ssl.days }} -newkey rsa:2048
      -keyout {{ ssl.key }}
      -out    {{ ssl.cert }}
      -subj   "/C={{ ssl.country }}/ST={{ ssl.state }}/O={{ ssl.org }}/CN={{ server.domain }}"
      -addext "subjectAltName=DNS:{{ server.hostname }},DNS:{{ server.hostname }}.{{ server.domain }},DNS:{{ server.domain }},IP:{{ server.ip }}"
  args:
    creates: "{{ ssl.cert }}"
  notify: copy ca to webroot

- name: Proteger chave privada
  ansible.builtin.file:
    path: "{{ ssl.key }}"
    mode: "0600"

