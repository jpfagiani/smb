---
- name: Carregar variáveis do Samba
  ansible.builtin.include_vars: main.yml

- name: Instalar Samba
  ansible.builtin.apt:
    name: [samba, samba-common-bin, smbclient, rsyslog]
    state: present

# A auditoria full_audit envia para o syslog (facility local5) — sem esta
# regra do rsyslog nada vira arquivo e a página Logs do portal fica só
# com o log do daemon
- name: Direcionar auditoria do Samba para /var/log/samba/audit.log
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/49-samba-audit.conf
    content: |
      local5.*  -/var/log/samba/audit.log
      & stop
    mode: "0644"
  notify: restart rsyslog

- name: Habilitar e iniciar rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true

# ── Grupos ────────────────────────────────────────────────────────────────────

- name: Criar grupos dos compartilhamentos
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
    state: present
  loop: "{{ samba_groups }}"

# ── Usuários por compartilhamento ─────────────────────────────────────────────

- name: Criar usuário Linux por compartilhamento
  ansible.builtin.user:
    name: "{{ item.user | default(item.name | lower) }}"
    comment: "{{ item.name | replace('_', ' ') }}"
    shell: /usr/sbin/nologin
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    create_home: false
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  loop: "{{ samba_shares }}"
  no_log: true

# A senha só é definida quando o usuário ainda NÃO existe no Samba —
# reaplicar o playbook (ex.: via change-ip.sh) não pode resetar senhas
# que os usuários já trocaram pelo portal.
- name: Registrar usuários dos compartilhamentos no Samba
  ansible.builtin.shell: |
    U='{{ item.user | default(item.name | lower) }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  loop: "{{ samba_shares }}"
  changed_when: false
  no_log: true

# ── Usuários operacionais (admin + supervisao) ─────────────────────────────────

- name: Criar usuário administrador do servidor
  ansible.builtin.user:
    name: "{{ server.admin_user }}"
    comment: "Administrador CDPNI"
    shell: /usr/sbin/nologin
    groups: "{{ samba_all_groups | join(',') }}"
    append: false
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  no_log: true

- name: Criar usuários operacionais (jpfagiani, rcborges, cpd, supervisao)
  ansible.builtin.user:
    name: "{{ item.login }}"
    comment: "{{ item.fullname }}"
    shell: /usr/sbin/nologin
    group: "{{ item.primary }}"
    groups: "{{ item.groups }}"
    append: false
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  loop: "{{ samba_users }}"
  no_log: true

- name: Registrar admin do servidor no Samba
  ansible.builtin.shell: |
    U='{{ server.admin_user }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  changed_when: false
  no_log: true

- name: Registrar usuários operacionais no Samba
  ansible.builtin.shell: |
    U='{{ item.login }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  loop: "{{ samba_users }}"
  changed_when: false
  no_log: true

# ── Diretórios ─────────────────────────────────────────────────────────────────

- name: Criar diretórios dos compartilhamentos (0777 — controle via Samba)
  ansible.builtin.file:
    path: "{{ raid.mount }}/shares/{{ item.name }}"
    state: directory
    owner: "{{ item.user | default(item.name | lower) }}"
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    mode: "0777"
  loop: "{{ samba_shares }}"

- name: Criar lixeiras pessoais dos usuários operacionais
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ item.login }}"
    state: directory
    mode: "0700"
    owner: "{{ item.login }}"
    group: "{{ item.primary }}"
  loop: "{{ samba_users }}"

- name: Criar lixeira do admin do servidor
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ server.admin_user }}"
    state: directory
    mode: "0700"
    owner: "{{ server.admin_user }}"

# ── smb.conf ──────────────────────────────────────────────────────────────────

- name: Fazer backup do smb.conf original
  ansible.builtin.copy:
    src: /etc/samba/smb.conf
    dest: "/etc/samba/smb.conf.bak.{{ ansible_date_time.epoch }}"
    remote_src: true
    mode: "0644"
  ignore_errors: true

- name: Gerar smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    validate: "testparm -s %s"
  notify:
    - restart samba

- name: Habilitar e iniciar Samba
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: [smbd, nmbd]
