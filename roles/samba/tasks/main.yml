---
- name: Carregar variáveis do Samba
  ansible.builtin.include_vars: main.yml

- name: Instalar Samba
  ansible.builtin.apt:
    name: [samba, samba-common-bin, smbclient, rsyslog]
    state: present

# A auditoria full_audit envia para o syslog (facility local5) — sem esta
# regra do rsyslog nada vira arquivo e a página Logs do portal fica só
# com o log do daemon
- name: Direcionar auditoria do Samba para /var/log/samba/audit.log
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/49-samba-audit.conf
    content: |
      local5.*  -/var/log/samba/audit.log
      & stop
    mode: "0644"
  notify: restart rsyslog

- name: Habilitar e iniciar rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true

# ── Grupos ────────────────────────────────────────────────────────────────────

- name: Criar grupos dos compartilhamentos
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
    state: present
  loop: "{{ samba_groups }}"

# ── Usuários por compartilhamento ─────────────────────────────────────────────

- name: Criar usuário Linux por compartilhamento
  ansible.builtin.user:
    name: "{{ item.user | default(item.name | lower) }}"
    comment: "{{ item.name | replace('_', ' ') }}"
    shell: /usr/sbin/nologin
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    create_home: false
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  loop: "{{ samba_shares }}"
  no_log: true

# A senha só é definida quando o usuário ainda NÃO existe no Samba —
# reaplicar o playbook (ex.: via change-ip.sh) não pode resetar senhas
# que os usuários já trocaram pelo portal.
- name: Registrar usuários dos compartilhamentos no Samba
  ansible.builtin.shell: |
    U='{{ item.user | default(item.name | lower) }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  loop: "{{ samba_shares }}"
  changed_when: false
  no_log: true

# ── Usuários operacionais (admin + supervisao) ─────────────────────────────────

# Descobre quem JÁ existe antes de criar: os grupos suplementares (acesso
# aos shares + admin do portal via cdpni-admins) só são definidos na
# CRIAÇÃO. Depois disso o painel é a autoridade — reaplicar o playbook não
# rebaixa admins nem desfaz permissões alteradas no painel.
- name: Descobrir usuários já existentes
  ansible.builtin.getent:
    database: passwd

- name: Criar usuário administrador do servidor
  ansible.builtin.user:
    name: "{{ server.admin_user }}"
    comment: "Administrador CDPNI"
    shell: /usr/sbin/nologin
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  no_log: true

- name: Definir grupos do admin (apenas na criação)
  ansible.builtin.user:
    name: "{{ server.admin_user }}"
    groups: "{{ samba_all_groups | join(',') }}"
    append: false
  when: server.admin_user not in ansible_facts.getent_passwd
  no_log: true

- name: Criar usuários operacionais (jpfagiani, rcborges, cpd, supervisao)
  ansible.builtin.user:
    name: "{{ item.login }}"
    comment: "{{ item.fullname }}"
    shell: /usr/sbin/nologin
    group: "{{ item.primary }}"
    create_home: true
    password: "{{ samba.default_pass | password_hash('sha512') }}"
    update_password: on_create
  loop: "{{ samba_users }}"
  no_log: true

- name: Definir grupos dos usuários operacionais (apenas na criação)
  ansible.builtin.user:
    name: "{{ item.login }}"
    groups: "{{ item.groups }}"
    append: false
  loop: "{{ samba_users }}"
  when: item.login not in ansible_facts.getent_passwd
  no_log: true

- name: Registrar admin do servidor no Samba
  ansible.builtin.shell: |
    U='{{ server.admin_user }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  changed_when: false
  no_log: true

- name: Registrar usuários operacionais no Samba
  ansible.builtin.shell: |
    U='{{ item.login }}'
    if ! pdbedit -u "$U" >/dev/null 2>&1; then
        printf '%s\n%s\n' "$SMBPASS" "$SMBPASS" | smbpasswd -s -a "$U"
    fi
    smbpasswd -e "$U" 2>/dev/null || true
  environment:
    SMBPASS: "{{ samba.default_pass }}"
  loop: "{{ samba_users }}"
  changed_when: false
  no_log: true

# ── Diretórios ─────────────────────────────────────────────────────────────────

- name: Criar diretórios dos compartilhamentos (0777 — controle via Samba)
  ansible.builtin.file:
    path: "{{ raid.mount }}/shares/{{ item.name }}"
    state: directory
    owner: "{{ item.user | default(item.name | lower) }}"
    group: "{{ item.group | default('grp_' + (item.name | lower)) }}"
    mode: "0777"
  loop: "{{ samba_shares }}"

- name: Criar lixeiras pessoais dos usuários operacionais
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ item.login }}"
    state: directory
    mode: "0700"
    owner: "{{ item.login }}"
    group: "{{ item.primary }}"
  loop: "{{ samba_users }}"

- name: Criar lixeira do admin do servidor
  ansible.builtin.file:
    path: "{{ raid.mount }}/recycle/{{ server.admin_user }}"
    state: directory
    mode: "0700"
    owner: "{{ server.admin_user }}"

# Na instalação limpa esta role roda ANTES da flask_portal e o usuário do
# portal ainda não existe — o setfacl abaixo falharia ("argumento inválido").
# Cria com os mesmos parâmetros da flask_portal (idempotente).
- name: Garantir que o usuário de serviço do portal existe (ACL abaixo)
  ansible.builtin.user:
    name: "{{ portal.user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ portal.dir }}"
    create_home: false
    groups: shadow,adm
    append: true

# O chmod 0700 acima mascara a ACL de leitura do portal; reaplica aqui,
# no próprio role samba, para que rodar SÓ a tag samba (ex.: change-ip.sh)
# não deixe a página Lixeira do portal sem acesso (erro 500).
- name: Garantir leitura do portal na lixeira (ACL, sobrevive ao chmod 0700)
  ansible.builtin.shell: |
    setfacl -R  -m u:{{ portal.user }}:rx {{ raid.mount }}/recycle
    setfacl -R -d -m u:{{ portal.user }}:rx {{ raid.mount }}/recycle
  changed_when: false
  ignore_errors: true

# ── smb.conf ──────────────────────────────────────────────────────────────────

- name: Fazer backup do smb.conf original
  ansible.builtin.copy:
    src: /etc/samba/smb.conf
    dest: "/etc/samba/smb.conf.bak.{{ ansible_date_time.epoch }}"
    remote_src: true
    mode: "0644"
  ignore_errors: true

- name: Gerar smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    validate: "testparm -s %s"
  notify:
    - restart samba

- name: Habilitar e iniciar Samba
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: [smbd, nmbd]
