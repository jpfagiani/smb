---
# Sem internet o refresh do cache falha, mas isso não pode abortar um
# re-run com os pacotes já instalados; se faltarem pacotes E não houver
# internet, a task de instalação seguinte falha com o erro verdadeiro.
- name: Atualizar cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  ignore_errors: true

- name: Instalar nginx e dependências Python
  ansible.builtin.apt:
    name:
      - nginx
      - python3
      - python3-pip
      - python3-venv
      - python3-pam
      - smbclient
    state: present

- name: Criar estrutura de diretórios do nginx
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled

- name: Garantir que nginx.conf inclui sites-enabled
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    marker: "# {mark} CDPNI sites-enabled"
    insertbefore: '^}'
    block: |
        include /etc/nginx/sites-enabled/*;
    state: present
  when: >
    lookup('file', '/etc/nginx/nginx.conf') is not search('sites-enabled')

- name: Criar usuário de serviço do portal
  ansible.builtin.user:
    name: "{{ portal.user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ portal.dir }}"
    create_home: false
    groups: shadow,adm
    append: true

- name: Criar serviço PAM exclusivo para o portal (sem winbind)
  ansible.builtin.copy:
    dest: /etc/pam.d/cdpni-portal
    content: |
      auth     required    pam_unix.so
      account  required    pam_unix.so
      password required    pam_unix.so obscure sha512
      session  optional    pam_unix.so
    mode: "0644"

- name: Criar diretório do portal
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ portal.user }}"
    group: "{{ portal.user }}"
    mode: "0750"
  loop:
    - "{{ portal.dir }}"
    - "{{ portal.dir }}/banners"

- name: Criar virtualenv Python
  ansible.builtin.command: python3 -m venv {{ portal.dir }}/venv
  args:
    creates: "{{ portal.dir }}/venv/bin/activate"
  become_user: "{{ portal.user }}"

- name: Instalar pacotes Python no virtualenv
  ansible.builtin.pip:
    name:
      - flask==3.1.0
      - python-pam==2.0.2
      - gunicorn==23.0.0
      - werkzeug==3.1.3
      - six
    virtualenv: "{{ portal.dir }}/venv"
    state: present

- name: Gerar config.py do portal
  ansible.builtin.template:
    src: config.py.j2
    dest: "{{ portal.dir }}/config.py"
    owner: "{{ portal.user }}"
    group: "{{ portal.user }}"
    mode: "0640"
  notify: restart portal

- name: Copiar app.py
  ansible.builtin.copy:
    src: app.py
    dest: "{{ portal.dir }}/app.py"
    owner: "{{ portal.user }}"
    group: "{{ portal.user }}"
    mode: "0640"
  notify: restart portal

- name: Criar permissions.json se não existir
  ansible.builtin.copy:
    dest: "{{ portal.dir }}/permissions.json"
    content: "{}"
    owner: "{{ portal.user }}"
    group: "{{ portal.user }}"
    mode: "0640"
    force: false

- name: Configurar ACL para o usuário do portal acessar os shares
  ansible.posix.acl:
    path: "{{ item }}"
    entity: "{{ portal.user }}"
    etype: user
    permissions: rx
    state: present
  loop:
    - "{{ raid.mount }}"
    - "{{ raid.mount }}/shares"
  ignore_errors: true

- name: Configurar ACL nos diretórios dos shares (leitura + escrita para o portal)
  ansible.builtin.shell: |
    find {{ raid.mount }}/shares -maxdepth 1 -type d \
      -exec setfacl -m u:{{ portal.user }}:rwx {} \;
  changed_when: false
  ignore_errors: true

- name: Criar wrapper de alteração de senha (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-setpass
    content: |
      #!/bin/bash
      user="$1"
      pass="$2"
      hash=$(openssl passwd -6 "$pass")
      sed -i "s|^${user}:[^:]*:|${user}:${hash}:|" /etc/shadow
    mode: "0700"
    owner: root
    group: root

- name: Criar wrapper de membros de grupo (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-setgroup
    content: |
      #!/usr/bin/env python3
      # Uso: cdpni-setgroup <grupo> <membro1,membro2,...>
      import sys, re

      group   = sys.argv[1]
      members = sys.argv[2] if len(sys.argv) > 2 else ''

      for path in ('/etc/group', '/etc/gshadow'):
          try:
              with open(path) as f:
                  lines = f.readlines()
              out = []
              for line in lines:
                  parts = line.rstrip('\n').split(':')
                  if parts[0] == group:
                      parts[-1] = members
                      line = ':'.join(parts) + '\n'
                  out.append(line)
              with open(path, 'w') as f:
                  f.writelines(out)
          except FileNotFoundError:
              pass
    mode: "0700"
    owner: root
    group: root

- name: Criar wrapper de criação de grupo (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-groupadd
    content: |
      #!/usr/bin/env python3
      # Uso: cdpni-groupadd [-f] <groupname>
      import sys, re, subprocess

      args = sys.argv[1:]
      force = '-f' in args
      groupname = next(a for a in args if not a.startswith('-'))

      if not re.match(r'^[a-z][a-z0-9_-]{0,31}$', groupname):
          print(f'Nome inválido: {groupname}', file=sys.stderr)
          sys.exit(1)

      with open('/etc/group') as f:
          exists = any(line.split(':')[0] == groupname for line in f)

      if exists:
          if force:
              sys.exit(0)
          print(f'Grupo já existe: {groupname}', file=sys.stderr)
          sys.exit(9)

      cmd = ['groupadd']
      if force:
          cmd.append('-f')
      cmd.append(groupname)
      result = subprocess.run(cmd, capture_output=True, text=True)

      with open('/etc/group') as f:
          created = any(line.split(':')[0] == groupname for line in f)

      if not created:
          print(result.stderr or 'groupadd falhou', file=sys.stderr)
          sys.exit(1)

      try:
          with open('/etc/gshadow') as f:
              content = f.read()
          if not any(l.split(':')[0] == groupname for l in content.splitlines()):
              with open('/etc/gshadow', 'a') as f:
                  f.write(f'{groupname}:!::\n')
      except FileNotFoundError:
          pass

      print(f'Grupo {groupname} criado')
    mode: "0700"
    owner: root
    group: root

- name: Criar wrapper de exclusão de grupo (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-groupdel
    content: |
      #!/usr/bin/env python3
      import sys, subprocess

      groupname = sys.argv[1]
      result = subprocess.run(['groupdel', groupname], capture_output=True, text=True)

      with open('/etc/group') as f:
          still_exists = any(line.split(':')[0] == groupname for line in f)

      if still_exists:
          print(result.stderr or 'groupdel falhou', file=sys.stderr)
          sys.exit(1)

      try:
          with open('/etc/gshadow') as f:
              lines = f.readlines()
          with open('/etc/gshadow', 'w') as f:
              f.writelines(l for l in lines if l.split(':')[0] != groupname)
      except FileNotFoundError:
          pass

      print(f'Grupo {groupname} removido')
    mode: "0700"
    owner: root
    group: root

- name: Criar wrapper de exclusão de usuário (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-userdel
    content: |
      #!/usr/bin/env python3
      import sys, subprocess

      username = sys.argv[1]
      result = subprocess.run(['userdel', '-r', username], capture_output=True, text=True)

      with open('/etc/passwd') as f:
          still_exists = any(line.split(':')[0] == username for line in f)

      if still_exists:
          print(result.stderr or 'userdel falhou', file=sys.stderr)
          sys.exit(1)

      try:
          with open('/etc/gshadow') as f:
              lines = f.readlines()
          with open('/etc/gshadow', 'w') as f:
              f.writelines(l for l in lines if l.split(':')[0] != username)
      except FileNotFoundError:
          pass

      print(f'Usuário {username} removido')
    mode: "0700"
    owner: root
    group: root

- name: Criar wrapper de criação de usuário (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-useradd
    content: |
      #!/usr/bin/env python3
      # Uso: cdpni-useradd <username>
      # Cria usuário Linux editando /etc/passwd, /etc/shadow, /etc/group, /etc/gshadow
      # diretamente, sem passar pelo kernel audit que bloqueia useradd.
      import sys, re, subprocess

      username = sys.argv[1]

      if not re.match(r'^[a-z][a-z0-9_-]{0,31}$', username):
          print(f'Nome inválido: {username}', file=sys.stderr)
          sys.exit(1)

      with open('/etc/passwd') as f:
          for line in f:
              if line.split(':')[0] == username:
                  print(f'Usuário já existe: {username}', file=sys.stderr)
                  sys.exit(1)

      result = subprocess.run(
          ['useradd', '--no-log-init', '-m', '-s', '/bin/bash', username],
          capture_output=True, text=True
      )

      created = any(line.split(':')[0] == username for line in open('/etc/passwd'))
      if not created:
          print(result.stderr or 'useradd falhou', file=sys.stderr)
          sys.exit(1)

      try:
          with open('/etc/gshadow') as f:
              content = f.read()
          if not any(l.split(':')[0] == username for l in content.splitlines()):
              with open('/etc/gshadow', 'a') as f:
                  f.write(f'{username}:!::\n')
      except FileNotFoundError:
          pass

      print(f'Usuário {username} criado')
    mode: "0700"
    owner: root
    group: root

- name: Instalar wrapper de operações RAID (saúde, hot spare, expansão)
  ansible.builtin.template:
    src: cdpni-raid.py.j2
    dest: /usr/local/bin/cdpni-raid
    owner: root
    group: root
    mode: "0700"

- name: Criar wrapper SMART (evita auditoria do sudo)
  ansible.builtin.copy:
    dest: /usr/local/bin/cdpni-smart
    content: |
      #!/bin/bash
      disk="$1"
      if [[ ! "$disk" =~ ^/dev/[a-z]+$ ]]; then
          echo "Dispositivo inválido: $disk" >&2
          exit 1
      fi
      exec /usr/sbin/smartctl -a -d sat -T permissive "$disk"
    mode: "0700"
    owner: root
    group: root

- name: Configurar sudoers para o portal (chpasswd + smbpasswd)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/cdpni-portal
    content: |
      Defaults:{{ portal.user }} !log_allowed, !syslog, !requiretty
      {{ portal.user }} ALL=(root) NOPASSWD: /usr/local/bin/cdpni-setpass, /usr/local/bin/cdpni-setgroup, /usr/local/bin/cdpni-useradd, /usr/local/bin/cdpni-userdel, /usr/local/bin/cdpni-groupadd, /usr/local/bin/cdpni-groupdel, /usr/local/bin/cdpni-smart, /usr/local/bin/cdpni-raid, /usr/bin/smbpasswd, /usr/sbin/useradd, /usr/sbin/userdel, /usr/sbin/usermod, /usr/sbin/groupadd, /usr/sbin/groupdel, /usr/bin/gpasswd, /usr/bin/tee, /bin/tee, /usr/bin/systemctl, /usr/bin/smbstatus, /usr/bin/smbcontrol, /usr/bin/testparm, /usr/bin/smartctl, /bin/mkdir, /bin/chmod, /bin/chown, /bin/tar, /usr/bin/tar, /usr/bin/tail, /usr/bin/setfacl, /usr/bin/getfacl, /bin/mv, /usr/bin/mv, /bin/rm, /usr/bin/rm, /bin/bash
    validate: visudo -cf %s
    mode: "0440"

- name: Instalar script de atualização de IP dinâmico
  ansible.builtin.template:
    src: cdpni-update-ip.sh.j2
    dest: /usr/local/bin/cdpni-update-ip.sh
    owner: root
    group: root
    mode: "0755"

- name: Criar serviço systemd de atualização de IP
  ansible.builtin.template:
    src: cdpni-update-ip.service.j2
    dest: /etc/systemd/system/cdpni-update-ip.service
    mode: "0644"
  notify:
    - reload systemd

- name: Habilitar serviço de atualização de IP
  ansible.builtin.systemd:
    name: cdpni-update-ip
    enabled: true
    daemon_reload: true

- name: Criar serviço systemd do portal
  ansible.builtin.template:
    src: cdpni-portal.service.j2
    dest: /etc/systemd/system/cdpni-portal.service
    mode: "0644"
  notify:
    - reload systemd
    - restart portal

- name: Criar logs do portal
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ portal.user }}"
    group: "{{ portal.user }}"
    mode: "0664"
  loop:
    - /var/log/cdpni_portal_access.log
    - /var/log/cdpni_portal_error.log

- name: Configurar Nginx — portal (8443 SSL)
  ansible.builtin.template:
    src: nginx-portal.conf.j2
    dest: /etc/nginx/sites-available/cdpni-portal
    mode: "0644"

- name: Ativar site do portal
  ansible.builtin.file:
    src: /etc/nginx/sites-available/cdpni-portal
    dest: /etc/nginx/sites-enabled/cdpni-portal
    state: link

- name: Remover site default do nginx
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Validar config do nginx
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Recarregar nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
    enabled: true

- name: Habilitar e iniciar portal
  ansible.builtin.systemd:
    name: cdpni-portal
    state: started
    enabled: true
    daemon_reload: true

- name: Verificar que nginx escuta na porta 8443
  ansible.builtin.wait_for:
    port: 8443
    host: 127.0.0.1
    timeout: 15

