---
# Trava de segurança: o critério é "existe um RAID utilizável?".
#   1. Se {{ raid.mount }} não está montado mas existe um filesystem
#      SAMBA_DATA íntegro, tenta montá-lo — servidor em produção após
#      um boot atípico é aproveitado, nunca destruído.
#   2. Montado (já estava, ou montou agora) = produção →
#      nenhuma operação destrutiva roda (re-run seguro).
#   3. Não montável = instalação limpa → arrays residuais são parados,
#      discos limpos e o RAID recriado E SEMPRE formatado (um wipefs nos
#      membros não apaga o superbloco XFS antigo no meio da área de
#      dados — esse "filesystem fantasma" reaparece no array novo e,
#      sem formatar, o mount falha com "superbloco inválido").
# Trava absoluta: os nomes sdX mudam entre boots (o disco do SO desta
# máquina era sda na instalação do Debian e hoje é sdb). Se o disco que
# hospeda o / aparecer em raid.devices, NADA roda.
# Trava de formatação: antes do caminho destrutivo, um assemble tenta
# remontar array existente (cobre o reboot pós-uninstall, que purga o
# mdadm e deixa o array sem montar no boot). Se ainda assim não montar e
# os discos tiverem assinaturas de RAID/filesystem de instalação anterior,
# nada é formatado sem raid.confirmo_formatacao: true no group_vars/all.yml
# (o bootstrap.sh pergunta e grava; discos em branco não exigem a flag).
- name: Identificar o disco do sistema operacional
  ansible.builtin.shell: |
    SRC=$(findmnt -n -o SOURCE /)
    PK=$(lsblk -no PKNAME "$SRC" 2>/dev/null | head -1)
    echo "/dev/${PK:-$(basename "$SRC" | sed 's/[0-9]*$//')}"
  register: disco_so
  changed_when: false

# raid.devices deve usar caminhos ESTÁVEIS /dev/disk/by-id/... (gere com
# scripts/raid_ids.sh) — resolve tudo para o nome real do kernel neste boot
- name: Resolver dispositivos do RAID para nomes reais deste boot
  ansible.builtin.shell: |
    {% for d in raid.devices %}
    readlink -f "{{ d }}" 2>/dev/null || echo "{{ d }}"
    {% endfor %}
  register: raid_devs_reais
  changed_when: false

- name: Abortar se o disco do SO estiver na lista do RAID
  ansible.builtin.assert:
    that: (disco_so.stdout | trim) not in raid_devs_reais.stdout_lines
    fail_msg: >-
      PERIGO: {{ disco_so.stdout | trim }} hospeda o sistema operacional e
      está listado em raid.devices ({{ raid.devices | join(', ') }}).
      Os nomes sdX mudam entre boots — use caminhos estáveis: rode
      scripts/raid_ids.sh e cole a saída no group_vars/all.yml.
      Nenhuma alteração foi feita.

# raid.level == 0 → MODO DISCO ÚNICO: sem mdadm; o filesystem vai
# direto no disco. dados_dev é o dispositivo que recebe o XFS.
- name: Definir dispositivo de dados (array ou disco único)
  ansible.builtin.set_fact:
    dados_dev: "{{ raid.device if (raid.level | int) != 0 else (raid_devs_reais.stdout_lines | first) }}"

# Após uninstall.sh + reboot o mdadm foi purgado e o array intacto não
# montou no boot — sem este assemble ele seria tratado como "instalação
# limpa" e formatado. Assemble nunca destrói dados (ao contrário de create).
- name: Tentar montar arrays md existentes (recuperação pós-reinstalação)
  ansible.builtin.shell: |
    if ! findmnt -n {{ raid.mount }} >/dev/null 2>&1 && [ -z "$(blkid -L SAMBA_DATA 2>/dev/null)" ]; then
        mdadm --assemble --scan 2>/dev/null || true
        udevadm settle 2>/dev/null || true
    fi
  when: (raid.level | int) != 0
  changed_when: false
  failed_when: false

- name: Tentar aproveitar RAID existente (proteção de dados)
  ansible.builtin.shell: |
    if ! findmnt -n {{ raid.mount }} >/dev/null 2>&1; then
        dev=$(blkid -L SAMBA_DATA 2>/dev/null || true)
        if [ -n "$dev" ]; then
            mkdir -p {{ raid.mount }}
            mount "$dev" {{ raid.mount }} 2>/dev/null || true
        fi
    fi
  changed_when: false
  failed_when: false

- name: Verificar se o RAID está montado (produção)
  ansible.builtin.command: findmnt -n {{ raid.mount }}
  register: raid_montado
  failed_when: false
  changed_when: false

# Última linha de defesa antes do caminho destrutivo: discos com restos de
# uma instalação anterior só são formatados com autorização explícita.
- name: Detectar assinaturas de dados nos discos selecionados
  ansible.builtin.shell: |
    for d in {{ raid_devs_reais.stdout_lines | join(' ') }}; do
        tipo=$(blkid -o value -s TYPE "$d" 2>/dev/null)
        ptt=$(blkid -o value -s PTTYPE "$d" 2>/dev/null)
        if [ -n "${tipo}${ptt}" ] || mdadm --examine "$d" >/dev/null 2>&1; then
            echo "$d (${tipo:-${ptt:-md}})"
        fi
    done
  register: discos_com_dados
  when: raid_montado.rc != 0
  changed_when: false
  failed_when: false

- name: Abortar formatação sem confirmação explícita
  ansible.builtin.assert:
    that: raid.confirmo_formatacao | default(false) | bool
    fail_msg: >-
      PERIGO: {{ raid.mount }} não pôde ser montado e os discos
      {{ discos_com_dados.stdout_lines | join(', ') }} contêm assinaturas de
      RAID/filesystem de uma instalação anterior. Para PRESERVAR os dados,
      monte o array antes e rode o playbook de novo
      (scripts/restore_pos_reinstall.sh raid <backup>). Para APAGAR tudo,
      defina raid.confirmo_formatacao: true no group_vars/all.yml.
      Nenhuma alteração foi feita.
  when: raid_montado.rc != 0 and (discos_com_dados.stdout_lines | default([]) | length) > 0

- name: Parar arrays md residuais nos discos selecionados (instalação limpa)
  ansible.builtin.shell: |
    for md in $(awk '/^md/{print $1}' /proc/mdstat); do
        if mdadm --detail "/dev/$md" 2>/dev/null | grep -qE '{{ raid_devs_reais.stdout_lines | join("|") }}'; then
            umount -f "/dev/$md" 2>/dev/null || true
            mdadm --stop "/dev/$md"
        fi
    done
  when: raid_montado.rc != 0
  changed_when: true

- name: Zerar superbloco dos discos (instalação limpa)
  ansible.builtin.shell: |
    mdadm --zero-superblock --force {{ item }} 2>/dev/null || true
    wipefs -af {{ item }} 2>/dev/null || true
  loop: "{{ raid.devices }}"
  changed_when: true
  when: raid_montado.rc != 0

- name: Criar array RAID {{ raid.level }}
  ansible.builtin.shell: |
    mdadm --create {{ raid.device }} \
      --level={{ raid.level }} \
      --raid-devices={{ raid.devices | length }} \
      {% if raid.level in [5, 6] %}--layout=left-symmetric --chunk=512K {% endif %}
      {% if raid.level == 10 %}--layout=n2 --chunk=512K {% endif %}
      --metadata=1.2 --name=data --force --run \
      {{ raid.devices | join(' ') }}
  args:
    creates: "{{ raid.device }}"
  when: raid_montado.rc != 0 and (raid.level | int) != 0
  register: raid_created

- name: Aguardar dispositivo RAID ficar disponível
  ansible.builtin.wait_for:
    path: "{{ raid.device }}"
    timeout: 60
  when: raid_montado.rc != 0 and (raid.level | int) != 0

# Em produção o array pode ter outro nome (ex.: /dev/md127) — usa o
# dispositivo realmente montado; na instalação limpa, o raid.device.
- name: Determinar dispositivo real do RAID
  ansible.builtin.shell: findmnt -n -o SOURCE {{ raid.mount }} 2>/dev/null || echo {{ dados_dev }}
  register: raid_dev_real
  changed_when: false

- name: Acelerar sincronização inicial do RAID
  ansible.builtin.shell: echo 200000 > /proc/sys/dev/raid/speed_limit_min
  changed_when: false
  ignore_errors: true

- name: Salvar configuração do RAID em mdadm.conf
  ansible.builtin.shell: |
    mdadm --detail --scan > /etc/mdadm/mdadm.conf
    echo "MAILADDR root" >> /etc/mdadm/mdadm.conf
  changed_when: true
  when: (raid.level | int) != 0

- name: Atualizar initramfs
  ansible.builtin.command: update-initramfs -u -k all
  changed_when: true
  when: (raid.level | int) != 0

# Formata SEMPRE na instalação limpa (array recém-criado pode exibir um
# filesystem fantasma da instalação anterior — ver comentário no topo).
# Com o RAID montado (produção) esta task nunca roda.
- name: Formatar dispositivo de dados com XFS (instalação limpa)
  ansible.builtin.shell: |
    {% set n = raid.devices | length %}
    {% if raid.level == 5 %}
    mkfs.xfs -f -L SAMBA_DATA -d su=512k,sw={{ n - 1 }} {{ dados_dev }}
    {% elif raid.level == 6 %}
    mkfs.xfs -f -L SAMBA_DATA -d su=512k,sw={{ n - 2 }} {{ dados_dev }}
    {% elif raid.level == 10 %}
    mkfs.xfs -f -L SAMBA_DATA -d su=512k,sw={{ (n / 2) | int }} {{ dados_dev }}
    {% else %}
    mkfs.xfs -f -L SAMBA_DATA {{ dados_dev }}
    {% endif %}
  when: raid_montado.rc != 0
  register: xfs_format

- name: Criar ponto de montagem
  ansible.builtin.file:
    path: "{{ raid.mount }}"
    state: directory
    mode: "0755"

- name: Obter UUID do RAID
  ansible.builtin.command: blkid -s UUID -o value {{ raid_dev_real.stdout | trim }}
  register: raid_uuid
  changed_when: false

# regexp ancora no ponto de montagem: uma reinstalação gera UUID novo e
# o antigo padrão ({{ raid.device }}) não casava com a linha UUID=…,
# acumulando entradas duplicadas no fstab
- name: Adicionar RAID ao fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+{{ raid.mount }}\s'
    line: "UUID={{ raid_uuid.stdout }}  {{ raid.mount }}  xfs  defaults,noatime,nodiratime,allocsize=64m,largeio  0  2"
    state: present

- name: Montar RAID
  ansible.posix.mount:
    path: "{{ raid.mount }}"
    src: "UUID={{ raid_uuid.stdout }}"
    fstype: xfs
    opts: defaults,noatime,nodiratime,allocsize=64m,largeio
    state: mounted

- name: Criar estrutura de diretórios no RAID
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "{{ '1777' if 'recycle' in item else '0777' }}"
  loop:
    - "{{ raid.mount }}/shares"
    - "{{ raid.mount }}/recycle"

- name: Criar arquivo de marca de formatação
  ansible.builtin.file:
    path: "{{ raid.mount }}/.formatted"
    state: touch
    mode: "0644"

- name: Instalar script de monitoramento RAID
  ansible.builtin.copy:
    dest: /usr/local/bin/raid_check.sh
    mode: "0755"
    content: |
      #!/bin/bash
      RAID="{{ raid.device }}"
      # Modo disco único (sem RAID): nada a monitorar — sai sem alertas falsos
      [ -b "$RAID" ] || exit 0
      STATE=$(mdadm --detail "$RAID" 2>/dev/null | awk '/State :/{print $3}')
      FAILED=$(mdadm --detail "$RAID" 2>/dev/null | awk '/Failed Devices/{print $4}')
      FAILED=${FAILED:-0}
      MSG=""
      [[ "$FAILED" -gt 0 ]] && MSG+="DISCO FALHO (${FAILED})! "
      [[ "$STATE" != "clean" && "$STATE" != "active" ]] && MSG+="Estado: ${STATE}. "
      if [[ -n "$MSG" ]]; then
          echo "$MSG" | mail -s "RAID ALERT $(hostname)" root 2>/dev/null || true
          echo "$(date): $MSG" >> /var/log/raid_alert.log
      fi
      echo "=== $(date) ===" >> /var/log/raid_check.log
      mdadm --detail "$RAID" >> /var/log/raid_check.log 2>&1
      # Conclui expansão pendente (xfs_growfs) quando o reshape termina —
      # a flag é criada pelo portal via /usr/local/bin/cdpni-raid expandir
      [ -x /usr/local/bin/cdpni-raid ] && \
          /usr/local/bin/cdpni-raid concluir-growfs >> /var/log/raid_check.log 2>&1 || true

- name: Agendar monitoramento RAID (cron horário)
  ansible.builtin.cron:
    name: "CDPNI RAID check"
    minute: "0"
    job: "/usr/local/bin/raid_check.sh"
    user: root

- name: Criar diretório drop-in smbd
  ansible.builtin.file:
    path: /etc/systemd/system/smbd.service.d
    state: directory
    mode: "0755"

- name: Dependência do smbd no RAID (systemd drop-in)
  ansible.builtin.copy:
    dest: /etc/systemd/system/smbd.service.d/raid-dependency.conf
    content: |
      [Unit]
      RequiresMountsFor={{ raid.mount }}
      After=local-fs.target
    mode: "0644"
  notify: reload systemd

