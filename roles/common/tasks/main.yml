---
- name: Atualizar cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar pacotes base
  ansible.builtin.apt:
    name:
      - sudo
      - curl
      - wget
      - vim
      - htop
      - rsync
      - net-tools
      - iproute2
      - lsof
      - bc
      - jq
      - bash-completion
      - ca-certificates
      - gnupg2
      - lsb-release
      - apt-transport-https
      - openssl
      - acl
      - attr
      - xfsprogs
      - e2fsprogs
      - mdadm
      - smartmontools
      - hdparm
      - cron
      - logrotate
      - mailutils
      - postfix
      - chrony
      # ifupdown garante ifup/ifquery/networking.service para o
      # /etc/network/interfaces gerado pelo role network
      - ifupdown
      # python3-yaml é usado pelo change-ip.sh (parse do all.yml)
      - python3-yaml
    state: present

- name: Configurar postfix (local only)
  ansible.builtin.debconf:
    name: postfix
    question: "{{ item.q }}"
    value: "{{ item.v }}"
    vtype: "{{ item.t }}"
  loop:
    - { q: postfix/main_mailer_type, v: "Local only",          t: select }
    - { q: postfix/mailname,         v: "{{ server.hostname }}", t: string }

- name: Definir hostname
  ansible.builtin.shell: |
    hostnamectl set-hostname "{{ server.hostname }}" 2>/dev/null || \
    echo "{{ server.hostname }}" > /etc/hostname && hostname "{{ server.hostname }}"
  changed_when: false

- name: Configurar /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

- name: Configurar NTP (chrony → gateway)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony

- name: Habilitar e iniciar chrony
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Configurar logrotate para logs CDPNI
  ansible.builtin.copy:
    dest: /etc/logrotate.d/cdpni
    mode: "0644"
    content: |
      /var/log/samba/log.* {
          weekly
          rotate 4
          missingok
          notifempty
          compress
          delaycompress
          sharedscripts
          postrotate
              [ -x /usr/bin/smbcontrol ] && /usr/bin/smbcontrol smbd rotate 2>/dev/null || true
          endscript
      }
      /var/log/cdpni*.log /var/log/samba_panel.log /var/log/raid_*.log {
          weekly
          rotate 8
          missingok
          notifempty
          compress
          delaycompress
      }

